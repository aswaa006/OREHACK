services:
  - type: static
    name: orehack-web
    plan: free
    nodeVersion: 20
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_SUPABASE_URL
        scope: build
      - key: VITE_SUPABASE_ANON_KEY
        scope: build
  - type: web
    name: orehack-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run server:start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        scope: run
      - key: JWT_SECRET
        scope: run
      - key: SUPABASE_URL
        scope: run
      - key: SUPABASE_SERVICE_ROLE_KEY
        scope: run
